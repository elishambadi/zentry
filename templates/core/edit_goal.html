{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-6 border border-gray-200">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Edit Goal</h1>

        <form method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Title</label>
                {{ form.title }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                {{ form.description }}
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Term</label>
                    {{ form.term }}
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Target date</label>
                    {{ form.target_date }}
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Image</label>
                {{ form.image }}
                {% if goal.image %}
                <img src="{{ goal.image.url }}" alt="{{ goal.title }}" class="mt-2 h-28 w-28 rounded-md object-cover border border-gray-200">
                {% endif %}
            </div>

            <div class="flex gap-3">
                <button type="submit" class="bg-primary-600 hover:bg-primary-700 text-white px-5 py-2 rounded-md">Save</button>
                <a href="{% url 'goals_list' %}" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-2 rounded-md">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
